name: Build and Push to ACR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  
jobs:
  build-and-push:
    runs-on: self-hosted
    
    env:
      IMAGE_NAME: todo-add-tasks-api
      IMAGE_TAG: v1
      ACR_NAME: acrrg3
      ACR_LOGIN_SERVER: acrrg3.azurecr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          az acr login --name $env:ACR_NAME

      - name: Build Docker Image
        run: |
          docker build -t $env:IMAGE_NAME:$env:IMAGE_TAG .

      - name: Tag Docker Image for ACR
        run: |
          docker tag $env:IMAGE_NAME:$env:IMAGE_TAG $env:ACR_LOGIN_SERVER/$env:IMAGE_NAME:$env:IMAGE_TAG

      - name: Push Docker Image to ACR
        run: |
          docker push $env:ACR_LOGIN_SERVER/$env:IMAGE_NAME:$env:IMAGE_TAG